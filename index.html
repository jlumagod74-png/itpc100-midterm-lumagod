<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Company Profile Card</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Internal CSS -->
  <style>
    article {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
  </style>

</head>
<body>

  <header>
    <h1>My Company</h1>
    <p>Your success is our mission</p>
  </header>

  <main>
    <article>
      <h2>About Us</h2>
      <p>We are a startup company focused on providing quality services and innovative solutions.</p>
    </article>
  </main>

  <footer>
    <p>© 2026 My Company</p>

    <!-- Inline CSS -->
    <button style="background-color: blue; color: white; padding: 10px;">
      Contact Us
    </button>
  </footer>

</body>
</html>
